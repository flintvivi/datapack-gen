{% extends "main.html" %}

{% block main %}
<main class="landing-shell">
    <section class="dashboard-grid" aria-label="Dashboard preview">
        <div class="stack stack-primary">
            <div class="tile tile-large">
                <!--generator selector-->
                <h2 class="text-left tile-header">Generators</h2>
                <div class="tool-body">
                    <a class="tool-card" href="#">
                        <h3 class="text-[1.17em]">Enchantments</h3>
                        <i class="fa-solid fa-book"></i>
                    </a>
                    <a class="tool-card" href="#">
                        <h3 class="text-[1.17em]">Recipes</h3>
                        <i class="fa-solid fa-table-cells"></i>
                    </a>
                    <a class="tool-card" href="#">
                        <h3 class="text-[1.17em]">Advancements</h3>
                        <i class="fa-solid fa-flag"></i>
                    </a>
                    <a class="tool-card" href="#">
                        <h3 class="text-[1.17em]">Blank Pack</h3>
                        <i class="fa-solid fa-code"></i>
                    </a>
                </div>
            </div>
            <div class="tile tile-medium"></div>
        </div>
        <div class="stack stack-secondary">
            <div class="tile tile-small"></div>
            <div class="tile tile-wide"></div>
            <div class="tile tile-small"></div>
        </div>
    </section>
</main>
{% endblock %}
