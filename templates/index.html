{% extends "main.html" %}

{% block main %}
<header class=""></header>
<div class="container mt-5 card-container">
    <div class="card">
        <!--about card-->
        <img src="{{ url_for('static', filename='images/cat.jpg') }}" class="card-img-top" alt="Placeholder Image">
        <div class="card-body">
            <h2 class="card-title">About</h5>
            <p class="card-text">Learn more about my project and its goals.</p>
            <a href="#" class="btn btn-primary">Learn More</a>

    <div class="card">
